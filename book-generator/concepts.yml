concepts:
  - term_zh: 自我企業化
    term_en: Entrepreneurial Self
    dilemma: 小雅做平面設計，朋友說「你要經營個人品牌」。她開始每天發文、做Reels、回留言，結果真正接案的時間被切碎，還一直覺得自己不夠「成功」。
    solution: 她把「品牌」改成「工作系統」：固定每週只發一次長文、其餘時間只做作品與休息。前兩個月流量掉很兇，她很焦慮，但半年後靠穩定案例與轉介紹，反而接到更適合的案子。

  - term_zh: 責任個人化
    term_en: Responsibilization
    dilemma: 阿哲被裁員，長輩說「你要反省是不是不夠努力」。他開始把所有失業的痛苦都吞進去，連求助都覺得丟臉。
    solution: 他加入求職互助群，把問題拆成「產業裁撤」「內推門檻」「履歷規格」三件事。剛開始他還是會自責，但一邊互改履歷、一邊共享職缺，最後靠群友內推回到職場，心裡也更不把一切怪自己。

  - term_zh: 功績神話
    term_en: Meritocracy Myth
    dilemma: 小蓉看到別人年紀輕輕得獎、上雜誌，就覺得「一定是我不夠好」。她越做越保守，只敢做「會被喜歡」的東西。
    solution: 她開始記錄「被看見的路徑」：誰介紹誰、誰在哪裡曝光、誰有資源。她很難接受這不是純實力，但一旦看清規則，就改為經營同儕合作與公共投稿，慢慢累積可見度而不是自我否定。

  - term_zh: 熱情剝削
    term_en: Passion Exploitation
    dilemma: 小豪做插畫，客戶說「我們很喜歡你的風格，但預算不多」。他想著「做喜歡的事不要計較」，接了三次後發現自己連房租都快付不出來。
    solution: 他做了簡單的「費率表」與「低預算方案」：少張數、少修改、交付更清楚。第一次講價他手心冒汗，也被拒絕兩次，但第三次他遇到願意尊重規則的客戶，工作變少卻更穩。

  - term_zh: 向下競爭
    term_en: Race to the Bottom
    dilemma: 工作群裡有人一直說「現在行情就這樣，便宜才有案子」。小芸只好壓價搶案，結果一做就爆肝，還被要求無限修改。
    solution: 她跟三個同行約定「不接低於某價格的案子」，並互相轉介適合的客戶。前期空窗讓她很恐慌，但半年後客戶開始把她視為「有標準的人」，她也不再靠拼命維生。

  - term_zh: 範圍膨脹
    term_en: Scope Creep
    dilemma: 阿明接了網站案，對方一開始只要五頁，後來又加活動頁、會員頁、還要改Logo。阿明覺得「都差不多啦」，做到後來崩潰，卻不敢加價。
    solution: 他學會用「變更單」：每新增一項就寫一段話＋一個新價格。客戶一開始覺得麻煩，但當阿明把交付時間與責任講清楚，對方反而更安心，最後案子雖然慢，但沒有失控。

  - term_zh: 無償試用
    term_en: Spec Work Normalization
    dilemma: 小真去應徵設計，對方說「先做三張給我們看看」。她熬夜做完，對方一句「不合」就消失，後來她在別人的廣告上看到自己的構圖。
    solution: 她改成只做「付費試作」或「看過往作品＋短談」的流程。她因此少掉很多機會，也很不甘心，但留下來的合作都更乾淨，後來甚至有公司主動問她的試作費率。

  - term_zh: 成本外部化
    term_en: Cost Externalization
    dilemma: 小凱接案被要求「你自己買字體、自己付圖庫、自己買軟體」。他以為這是常態，結果每個月工具費吃掉一大半收入。
    solution: 他在報價單加一行「工具與授權成本」，並提供替代選項（免費字體/客戶自購）。第一次他被說「你怎麼這麼計較」，但他撐住，後來反而有客戶感謝他把風險講清楚。

  - term_zh: 現金流壓迫
    term_en: Cashflow Coercion
    dilemma: 阿琳做自由接案，客戶總說「下個月一起結」。她每次都不好意思催款，直到信用卡循環越滾越大，工作越接越焦慮。
    solution: 她改為「50%訂金＋分段付款＋逾期停工」。前兩次她催款時心跳很快，也失去一個客戶，但剩下的客戶付款更準時，她的焦慮明顯下降。

  - term_zh: 知識產權圈地
    term_en: IP Enclosure
    dilemma: 小宇把插畫賣給品牌，對方說「買斷比較省事」。他答應了，後來看到對方把圖用在各種商品上，賺很多，但他只能拿一次性費用。
    solution: 他學會用「授權」：限定用途、期間、地區、加價延展。談判時客戶會嫌麻煩，他也會怕失去合作，但當他拿出清楚條款與價格表，反而讓對方知道怎麼買、也比較願意長期合作。

  - term_zh: 短期化
    term_en: Short-termism
    dilemma: 阿德每次案子做完就得立刻找下一單，生活像永遠在追公車。每當空窗，他就懷疑自己是不是快不行了。
    solution: 他開始推「維護合約」：每月固定時數、固定費用。前三個月沒人買，他差點放棄，但第四個老客戶說「這樣我也安心」，從此阿德的收入有了底。

  - term_zh: 可用性剝削
    term_en: Availability Exploitation
    dilemma: 客戶半夜兩點傳訊息「可以快回嗎」，小倩怕失禮就秒回。久了她的睡眠碎掉，白天腦袋像棉花。
    solution: 她建立「回覆時段」與「緊急費率」。剛開始她很怕被討厭，但當她把規則寫在合作文件裡，反而讓客戶知道界線；後來真的急件時，客戶也願意付加急費。

  - term_zh: 情緒勞動
    term_en: Emotional Labor
    dilemma: 小志做品牌提案，客戶每次都用情緒壓他：「你是不是不在乎我們？」他花很多力氣安撫，卻覺得自己的專業被掏空。
    solution: 他把討論改成「以文件決策」：每次會後寄紀要、請客戶確認。客戶一開始覺得冷，但情緒勒索變少了；他也學會在必要時說「我需要你用具體修改點回覆」。

  - term_zh: 社交資本商品化
    term_en: Networking as Capital
    dilemma: 阿芬覺得不去酒會就沒機會，但她其實怕吵也不喝酒。她硬撐去幾次，回家只剩空虛，還覺得自己很不會做人。
    solution: 她改成「白天咖啡小聚＋一對一介紹」：每週只約一次，且有明確目的。開始時她擔心太慢，但半年後她的人脈變得更深，合作更穩、也更像她自己。

  - term_zh: 差異化焦慮
    term_en: Differentiation Anxiety
    dilemma: 小彤總覺得「我一定要很獨特」，看到別人做類似風格就心慌。她花很多時間改風格，最後作品集反而散掉。
    solution: 她把焦點改成「議題與方法」：固定關心的主題、固定的研究方式。她一開始怕不夠酷，但當她的案例越來越一致，客戶反而更快理解她的價值。

  - term_zh: 生產力崇拜
    term_en: Productivism
    dilemma: 阿傑每天列滿待辦，覺得不忙就有罪惡感。久了他做事速度變慢，還開始討厭自己最喜歡的創作。
    solution: 他把行程改成「每週只抓三件大事」，留空白給休息。剛開始他覺得自己在偷懶，但一段時間後品質變好、失誤變少，他也找回對作品的耐心。

  - term_zh: 過勞美學
    term_en: Overwork Culture
    dilemma: 團隊裡有人炫耀熬夜，小瑄也跟著拼，覺得這是「專業」。結果她身體開始出狀況，卻還不敢停。
    solution: 她試著在專案初期就寫「工時與交付節點」，並加上趕工費。第一次她被說「你太硬了」，但她撐住，最後專案順利交付，她也第一次在不爆肝的狀態下完成大案。

  - term_zh: 即時性要求
    term_en: Instantaneity
    dilemma: 阿倫做設計，客戶常說「現在就要看到」。他一急就交半成品，客戶更愛插手，反而越改越亂。
    solution: 他改成「24小時內給方向、72小時內給版本」的節奏。客戶起初不耐，但當阿倫用更清楚的節點交付，決策反而更快，回頭改稿也變少。

  - term_zh: 管理主義
    term_en: Managerialism
    dilemma: 小瑜在機構工作，每天被要求填表、寫報告、追KPI，做設計的時間變很少。她開始懷疑自己是不是只剩行政。
    solution: 她跟主管談「最小可行文檔」：只記決策、風險、交付。談判很難，她也被說「不夠配合」，但她用一個月示範：文件更少，專案反而更順，最後主管接受了新格式。

  - term_zh: 量化治理
    term_en: Audit Culture
    dilemma: 阿翔做社區藝術計畫，補助單位問「你影響了幾個人？有沒有數字？」他明明知道影響很深，但一講數字就覺得自己在說謊。
    solution: 他做「雙軌成果」：一頁數字＋兩頁故事與訪談。填表時很累，也不一定被懂，但當他拿著這份文件去談下一個合作，對方更快理解他做的是什麼，資源也更穩。

  - term_zh: 可見性規訓
    term_en: Visibility Regime
    dilemma: 小蕙覺得「不被看見＝不存在」，每天盯著按讚數，心情被數字牽著走。她甚至開始只做會被分享的題材。
    solution: 她把成功改成「每月完成一件自己滿意的作品＋寄一次電子報」。前兩個月她很空虛，但半年後她收到長信：有人因她的文章來委託，她第一次覺得被看見不是靠追熱度。

  - term_zh: 平台依賴
    term_en: Platform Dependency
    dilemma: 阿凱靠某社群平台接案，某天突然被限流，詢問量掉一半，他像被抽走地板。
    solution: 他開始把客戶導向「表單＋名單」，每次合作都留下email。起初很慢，他也嫌麻煩，但一年後平台再變動時，他靠名單照樣能找回案源。

  - term_zh: 同質化激勵
    term_en: Homogenization Incentives
    dilemma: 小芸發現平台喜歡某種乾淨風格，她就一直做那套。流量確實上來了，但她越來越不認識自己的作品。
    solution: 她把作品分成「平台友善」與「個人研究」兩種，並固定每月公開一次研究。剛開始研究貼文很冷，但她慢慢吸引到真正理解她的人，後來接到更匹配的合作。

  - term_zh: 漏斗思維
    term_en: Funnel Thinking
    dilemma: 阿文被教「每個貼文都要導購」，他開始把朋友、觀眾都當成潛在客戶，講話也變得像廣告。結果互動變少，他更焦慮。
    solution: 他改成「社群不是漏斗，是共同體」：每月一次免費分享，但同時開放付費支持與清楚回饋。前期收入不穩，他也懷疑自己，但當支持者變成固定成員後，他的內容不再那麼用力推銷也能活下來。

  - term_zh: 可傳播性偏誤
    term_en: Shareability Bias
    dilemma: 小敏想做一個需要時間看懂的作品，但朋友說「這不夠一眼懂」。她改成簡單版本後很快被分享，卻覺得自己背叛了初衷。
    solution: 她做「分層敘事」：短版讓人進來，長版留在網站/展場。短版做起來不難，但長版要寫、要整理，很花力氣；最後她發現真正的支持者會走到長版，她也找回作品的深度。

  - term_zh: 數據化正當性
    term_en: Datafied Legitimacy
    dilemma: 品牌問阿杰「你的粉絲數多少？轉換率多少？」他明明做得很好，卻因為數字不大被否決。
    solution: 他用「可信任證據」替代：過往合作成果、流程可靠、推薦信。建立這套資料很費工，但當他拿這些去談中小型客戶，反而更快成交，因為對方要的是放心不是炫耀數字。

  - term_zh: 免費教育勞動
    term_en: Free Educational Labor
    dilemma: 小瑄常被要求「可以教一下怎麼做嗎」，她怕被說小氣就一直免費教。久了她發現自己像客服，創作時間被吃掉。
    solution: 她把教學分成三層：短答免費、系統教學收費、工作坊另計。她一開始很怕被討厭，但當她把規則講清楚，真正尊重她的人留下來，她也終於有時間做自己的作品。

  - term_zh: 租戶式平台
    term_en: Platform-as-Landlord
    dilemma: 阿德把作品都放在平台上，某天帳號出問題，作品像被鎖在別人家。
    solution: 他每次發文都同步備份到自己的網站與硬碟。備份很無聊也很慢，但一年後他換平台時一點都不慌，甚至用自己的網站拿到更專業的合作。

  - term_zh: 去政治化專業
    term_en: Depoliticized Professionalism
    dilemma: 小晴在公司提到可及性與勞動權益，被同事說「不要把政治帶進來」。她開始沉默，覺得自己的價值只能吞下去。
    solution: 她把「政治」翻成「風險與品質」：可及性＝更多用戶、勞動界線＝更少失誤。說服過程很累，也會被挑戰，但當一次專案因可及性做得好被客戶稱讚，公司才開始把這當成標準。

  - term_zh: 新奇壓力
    term_en: Novelty Pressure
    dilemma: 阿恩每次展覽都被問「你這次有什麼新東西？」他把自己逼到每季都要換題目，最後只剩疲憊。
    solution: 他學會把同一計畫切成不同章節，讓長期研究也能被理解。觀眾一開始會覺得「怎麼還在做這個」，但當他把每章的差異與學到的東西說清楚，支持反而更深。

  - term_zh: 中心—邊陲
    term_en: Center–Periphery
    dilemma: 小琳在國際申請時被暗示「要更全球化、更普世」。她把在地語境削薄，結果作品像觀光紀念品。
    solution: 她保留語境的複雜度，但加上互譯：讓外地人看得懂、又不把自己變成被消費的符號。翻譯很辛苦也常被誤解，但當她找到願意共同策展的夥伴後，作品在國際場合反而更站得住。

  - term_zh: 政治商品化
    term_en: Commodified Dissent
    dilemma: 阿豪做批判作品，機構邀展卻只想用他的政治性當宣傳。展完之後機構照樣不改內部不公平，他覺得被利用。
    solution: 他開始提出合作條件：酬勞、話語權、社群回饋、公開對話。談判常失敗，他也會失去舞台，但當一個較小的空間接受條款，展覽變成真的對話，他才覺得作品沒有被吞掉。

  - term_zh: 稀缺治理
    term_en: Scarcity Governance
    dilemma: 小真每年投補助，總覺得「名額很少，我要拼命」。她把時間花在寫申請，作品反而停住。
    solution: 她做混合收入：一部分補助、一部分教學、一部分小額訂閱。起初每一條都很小很不穩，但半年後三條加起來形成底，她投補助時也不再像在賭命。

  - term_zh: 申請勞動
    term_en: Application Labor
    dilemma: 阿哲把一整個月都用來投件，填表填到懷疑人生。最後沒上，他像白做工一樣崩潰。
    solution: 他加入「投件互助」：共用資料庫、互改、分工整理素材。協作一開始會混亂，但當大家建立模板後，投件時間少一半，上了的人也會回饋資源，整體更不孤單。

  - term_zh: 象徵報酬替代
    term_en: Symbolic Compensation
    dilemma: 小欣被邀請做活動視覺，「我們可以給你曝光」。她答應了，結果忙一週只換到一句Tag，帳單照樣來。
    solution: 她改成「曝光可以，但至少要交通＋製作費」，並要求對方提供可驗證的曝光方式（名單、連結、回饋）。一開始她被說現實，但當她不再倒貼，反而有活動願意把她當真正的合作方。

  - term_zh: 菁英再製
    term_en: Elite Reproduction
    dilemma: 阿凱發現很多機會只在某些圈子流通，他不在那裡就永遠晚一步。
    solution: 他開始參與公開社群、建立公開機會板，並把自己知道的也分享出去。這種做法短期不會讓他立刻上位，但長期讓他成為「資訊可靠的人」，合作與機會反而更常回到他身上。

  - term_zh: 作品集主義
    term_en: Portfolioism
    dilemma: 小慧的工作其實包含協調、研究、照護團隊，但面試只看作品圖。她覺得自己做的那些都像不存在。
    solution: 她做「案例敘事」：用一頁寫清楚她解決了什麼問題、怎麼協作、如何降低風險。寫起來很痛苦也很花時間，但當她遇到懂得看「工作方法」的雇主，對方反而更快信任她。

  - term_zh: 可雇用性政治
    term_en: Employability Politics
    dilemma: 阿文被要求「先變成可雇用的人」，他把自己改成一套標準模板。工作找到了，但他每天都覺得自己像被借走的人。
    solution: 他保留一個「不為雇用而做」的小計畫，每週固定兩小時。剛開始很難、也常被加班吞掉，但他慢慢用這個計畫建立下一步的方向，最後轉到更適合他的團隊。

  - term_zh: 監控資本主義
    term_en: Surveillance Capitalism
    dilemma: 小倩做行銷設計，被要求加更多追蹤碼、蒐集更多資料。她覺得不舒服，但又怕說了會被當成不懂商業。
    solution: 她提出「最少數據方案」：只追必要指標、明確告知使用者。推動很難，主管一開始覺得她找麻煩，但當隱私議題成為風險，團隊反而需要她這種人，最後她也被視為能控風險的專業。

  - term_zh: 數位泰勒主義
    term_en: Digital Taylorism
    dilemma: 阿哲遠端工作被要求開螢幕監控，連休息都怕被記錄。他越想證明自己努力，越做不出好東西。
    solution: 他跟團隊提議改為「成果里程碑」：每週交付清單、不要監控過程。談判會被懷疑、也可能失敗，但當他拿出兩週的成果對比（監控下更慢），主管才願意試行，最後效率真的提高。

  - term_zh: 邊界侵蝕
    term_en: Boundary Erosion
    dilemma: 小芸在家工作，客戶和同事隨時找她，她覺得自己像永遠待命。久了她連放鬆都不會。
    solution: 她設「數位宵禁」：晚上不回訊息，緊急用電話且要付費。前期她非常不安，但當她穩住界線後，白天更專注，交付更快，反而讓人更尊重她的時間。

  - term_zh: 工具焦慮
    term_en: Tool Churn
    dilemma: 阿凱一直追新軟體，覺得不用就落伍。結果他學一堆功能卻沒有任何作品落地。
    solution: 他選「最小工具鏈」：只保留兩個核心工具，其他一年只評估一次。放下潮流很難，他會手癢，但當作品開始真正完成，他才發現「完成」比「會很多」更有力量。

  - term_zh: 效率至上
    term_en: Efficiency Imperative
    dilemma: 公司說AI讓你更快，所以你要接更多工作。小晴越做越快，卻越覺得自己像機器。
    solution: 她把AI用在「省掉重複勞動」，把省下的時間用在研究、提案、品質控制。主管起初只想榨更多量，但當她用更好的成果說服客戶加價，公司才接受「快不是為了更多量，是為了更好」。

  - term_zh: 價格戰
    term_en: Price War
    dilemma: 阿文看到有人用超低價接案，客戶也拿來壓他。他一降價就要加班補回來，變成惡性循環。
    solution: 他改成賣「清楚成果」：交付範圍、修改次數、風險控制，並用案例證明省下客戶時間。前期會被嫌貴，但留下的客戶更長期，他也不必用命換錢。

  - term_zh: 市場自然化
    term_en: Market Naturalization
    dilemma: 有人對小真說「市場就這樣，價值就是看誰願意付」。她聽久了覺得自己只能接受，不可能改變。
    solution: 她開始參與在地市集與公共合作，把價值放回「使用者需要什麼」。這條路不會爆紅，也常遇到資源不足，但她慢慢建立固定社群，收入不一定最高，卻更穩也更有尊嚴。

  - term_zh: 商品化
    term_en: Commodification
    dilemma: 阿豪本來做很私人的作品，後來為了賣，把情緒也包裝成商品。賣出去那一刻他不開心，反而像失去一部分自己。
    solution: 他把作品分成「商品」與「不賣的作品」。一開始他會怕不賣就浪費，但當他保留一塊不被交易的空間，創作動力回來了，商品線也更健康，因為不是用痛苦硬擠。

  - term_zh: 生活商品化
    term_en: Life-as-Market
    dilemma: 小雅連旅行都在想「能不能拍成內容」。她拍到了，但整趟旅程像在上班，回家更空。
    solution: 她設定「不可變現日」：那天不拍、不發、不想業配。剛開始她怕錯過機會，但長期下來她更有能量，也更能做出真正想分享的東西。

  - term_zh: 可投資化
    term_en: Investability
    dilemma: 阿哲一直用「我是不是值得投資」看自己，做任何決定都像在算報酬率。他開始不敢冒險，也不敢停。
    solution: 他改用「我在服務誰、解決什麼」來做選擇。轉念很難，因為焦慮會一直回來，但當他用這個標準找到更一致的工作與社群，他的自我價值感不再每天被市場價格波動。

  - term_zh: 同儕競爭化
    term_en: Peer Rivalry
    dilemma: 小芸看到同行得案子就嫉妒，還會偷偷希望對方出錯。她知道這樣很糟，但停不下來。
    solution: 她開始做「互推」：把不適合自己的案子轉給別人，別人也回轉。起初她怕自己吃虧，但當這種互惠形成圈，她反而更常接到剛好適合她的案子，心態也變健康。

  - term_zh: 社群作為勞動市場
    term_en: Community-as-Labor-Market
    dilemma: 阿文加入社群本來想交朋友，最後卻變成一直在找案子、看誰有資源。朋友像資源，資源像朋友，他越來越累。
    solution: 他把社群分成兩個：一個是純朋友不談工作，一個是合作社群談規則。切分一開始很彆扭，但久了他的關係更清楚、也更不會在每次聊天時都感到壓力。

  - term_zh: 再生產勞動不可見
    term_en: Invisible Care Work
    dilemma: 小倩一邊照顧家人一邊接案，總覺得自己效率差。她看到別人全力衝刺，就覺得自己「不夠專業」。
    solution: 她開始把照護時間納入排程與報價，接更少案子但更合理。前期收入會緊，她也會內疚，但當她找到願意尊重時程的客戶後，生活與工作終於不再互相摧毀。

  - term_zh: 照護倫理
    term_en: Care Ethics
    dilemma: 阿豪總把自己放最後，覺得顧好別人才是好人。久了他心裡很怨，工作也開始敷衍。
    solution: 他把照護改成「有界線的照護」：先照顧自己，再照顧他人。這不是一夜之間做到，他會反覆破功，但當他能說「我現在不行」而不崩潰時，他才真正變得可靠。

  - term_zh: 非正式化
    term_en: Informalization
    dilemma: 朋友介紹案子，對方說「我們熟，不用合約」。小雅相信了，結果對方一直改、一直拖，最後還砍價。
    solution: 她用「最小合約」：一頁紙寫範圍、時間、付款。對方一開始酸她太見外，但她堅持：合約是保護關係，不是破壞關係；最後合作反而更順，朋友也沒因此消失。

  - term_zh: 恩惠式雇用
    term_en: Patronage Framing
    dilemma: 客戶對阿文說「我給你機會耶」，讓他不敢談條件。做完後對方還說「你要感恩」。
    solution: 他學會回應：「謝謝信任，我也會用專業交付，所以我們把條件講清楚。」第一次說出口很難，他聲音都抖，但當他把互利講成自然的事，對方反而比較不敢亂來。

  - term_zh: 決策責任轉嫁
    term_en: Blame Shifting
    dilemma: 小倩做設計，甲方內部吵架，最後把責任推到她身上：「你怎麼沒提醒？」
    solution: 她開始每次都用「確認點」鎖決策：哪個版本誰同意、什麼時間點決定。寫紀錄很煩，但當糾紛來時，她能拿出文件保護自己，專案也更少內耗。

  - term_zh: 單一決策者
    term_en: Single Decision Maker
    dilemma: 阿豪的案子有五個人給意見，每個人都要改，最後變成四不像。
    solution: 他要求對方指定一位決策者，其他人只能在某個時間點一次給意見。對方一開始覺得他很強勢，但當改稿次數大幅下降、交付更快，他們反而願意接受這種秩序。

  - term_zh: 定義完成
    term_en: Definition of Done
    dilemma: 小雅的專案永遠「差一點」，客戶一直說再優化一下。她不敢結案，錢也收不齊。
    solution: 她在一開始寫清楚「完成＝哪些檔案＋哪些頁面＋幾次修改」。客戶會想留模糊空間，她得一直拉回條款；但當她能準時結案並把維護另約，收入與生活都更穩。

  - term_zh: 維護合約
    term_en: Retainer Model
    dilemma: 阿哲每月收入像雲霄飛車，忙時忙到爆，閒時閒到怕。
    solution: 他向舊客戶推「每月固定時數」：小額但穩定。客戶起初會猶豫，他也怕被拒絕，但當第一個客戶買了，其他客戶也更願意跟進，他的焦慮像被放下了一半。

  - term_zh: 透明薪資
    term_en: Pay Transparency
    dilemma: 小倩不知道行情，只能憑感覺報價，常常報太低還以為是自己不夠格。
    solution: 她跟同業交換費率，建立匿名共享表。有人會怕被比較、怕被討厭，但當她拿到更接近真實的區間，她談價更有底氣，也更不容易被壓。

  - term_zh: 集體談判
    term_en: Collective Bargaining
    dilemma: 阿豪一個人去跟大客戶談條件，對方一句「我們很多人排隊」就把他壓回去。
    solution: 他和幾個同行約定一起守底線，必要時一起拒絕不合理條款。這需要高度信任，也會有人想偷跑，但當客戶發現「不是一個人難搞，是整個圈子有標準」，條件才開始鬆動。

  - term_zh: 合作社
    term_en: Worker Co-op
    dilemma: 小雅不想當老闆也不想一直單飛，但找工作又覺得被綁死。
    solution: 她和兩個夥伴成立小合作社：共同接案、共同分配、共同決策。前期最難是溝通與錢的分配，磨合會很痛，但當規則跑順後，她既有團隊支撐又保有自主。

  - term_zh: 互助網絡
    term_en: Mutual Aid
    dilemma: 阿哲突然生病，案子停擺，房租快繳不出來。他覺得向人求助很丟臉。
    solution: 他加入互助網：急難支援、轉介案子、共享資源。求助那刻很難，但當他康復後也回去幫別人，他才明白互助不是施捨，是讓每個人都能撐過低谷。

  - term_zh: 公共價值
    term_en: Public Value
    dilemma: 小倩做的設計明明改善了可及性與理解，但客戶只看短期轉換率，說她做的「不划算」。
    solution: 她把公共價值翻成可理解的語言：減少客服成本、增加信任、提升回訪。推這套需要時間與證據，她也會被說太理想，但當一次專案因為信任提升而帶來長期客戶，對方才開始願意聽。

  - term_zh: 使用價值
    term_en: Use-Value
    dilemma: 阿豪一直追「看起來很酷」的案子，作品很漂亮，卻常被使用者說「看不懂、不好用」。
    solution: 他把設計的第一問題改成「誰要用？什麼時候用？」做更多小測試。測試會被嫌慢，也會遇到沒預算，但當他把錯誤在早期修掉，專案後期就不再炸裂。

  - term_zh: 最小可行合約
    term_en: Minimum Viable Contract
    dilemma: 小雅每次談合約就頭痛，覺得寫太多會嚇跑人，結果常被拖延與追加。
    solution: 她做一份一頁模板：範圍、時間、付款、修改、版權。有人仍會嫌麻煩，她也要練習「不簽就不開工」，但當她遇到好客戶，對方反而覺得她專業可靠。

  - term_zh: 變更單
    term_en: Change Order
    dilemma: 阿哲每次客戶說「順便改一下」，他就答應，最後整個案子被順便改到失控。
    solution: 他建立一句固定回應：「可以，我整理成變更單給你選。」客戶會不爽、他也會怕，但當對方必須在「要不要加錢」之間做選擇，無限追加才停得下來。

  - term_zh: 加急費
    term_en: Rush Fee
    dilemma: 小倩每次遇到急件都硬吞，結果生活被打爛，還被當作理所當然。
    solution: 她設加急費並寫清楚「加急會影響其他案子」。第一次收加急費她很不安，但當客戶真的付了，她才知道急不是你的責任，是對方的需求要付代價。

  - term_zh: 非同步協作
    term_en: Async Norms
    dilemma: 阿豪的團隊天天即時會議，會越開越多，事情反而越慢。
    solution: 他推行非同步：文件先寫、會議只做決策。改文化會被抵抗，也會有人偷懶不寫，但當團隊發現會議變少、決策更快，大家才願意守規則。

  - term_zh: 可及性
    term_en: Accessibility
    dilemma: 小雅想做無障礙，但被說「那是加分項，不是必要」。她覺得自己在做沒人看見的苦工。
    solution: 她把可及性變成流程的一部分，並把風險說清楚：不做可能會失去使用者、甚至出法律問題。推動很辛苦，但當一次活動網站因無障礙做得好被大量轉傳，客戶才開始把它當必要。

  - term_zh: 倫理贊助
    term_en: Ethical Sponsorship
    dilemma: 阿哲接到大品牌合作，但品牌價值觀跟他相反。錢很誘人，他也很矛盾。
    solution: 他做「拒絕清單」與「可談條件」：例如要透明揭露、要回饋社群。拒絕會痛、也會怕錯失，但當他守住底線後，他吸引到更一致的合作方，長期更安心。

  - term_zh: 條件式合作
    term_en: Conditional Collaboration
    dilemma: 小倩被邀展，機構說「你來就好，其他我們決定」。她擔心自己只變成裝飾。
    solution: 她要求條件：製作費、協作方式、對話空間。談判會被說難搞，但當機構接受一部分，她的作品在展場不只是被展示，也真的引發討論與回饋。

  - term_zh: 署名政治
    term_en: Credit Politics
    dilemma: 阿豪做了大量工作，最後成品只寫了主管名字。別人以為他只是執行。
    solution: 他在合作前就把署名寫進文件，並在交付時附上貢獻清單。提出署名很尷尬也可能得罪人，但當他累積幾次清楚署名，外界才開始正確看見他的能力。

  - term_zh: 勞動標準
    term_en: Labor Standards
    dilemma: 小雅覺得文化圈總說「大家都很窮」，所以低薪是常態。她每次接受一次，心裡就更麻木。
    solution: 她跟同業一起做「最低報酬倡議」：公開費率、拒接剝削案。推動很慢，也會被說破壞氣氛，但當一些活動開始願意先把酬勞列入預算，標準就真的被推動了一點點。

  - term_zh: 地方性
    term_en: Localism
    dilemma: 阿哲一直追大城市大平台，覺得那才算成功，結果身心耗盡，作品也離生活很遠。
    solution: 他把一部分工作放回在地：和社區、學校、店家合作。收入起初不高、資源也少，但因為關係更穩，他反而做出更扎實的作品，生活也更能被支撐。

  - term_zh: 右尺寸
    term_en: Right-sizing
    dilemma: 小倩覺得一定要擴張才安全，於是接更多案、找更多客戶，結果管理成本炸裂。
    solution: 她把目標改成「剛剛好能活、能休息、能創作」。放下擴張會焦慮，但當她算清楚生活成本與工作上限，她的公司變小卻更健康，反而更長久。

  - term_zh: 去商品化區
    term_en: Decommodified Zone
    dilemma: 阿豪把每個想法都拿去變現，久了腦袋只剩「有沒有市場」。他開始感覺自己乾掉了。
    solution: 他保留一塊「不賣、不交付、不討好」的時間。初期他會懷疑這是不是浪費，但當那塊空間長出新作品與新方向，他才知道這是在養根。

  - term_zh: 分層敘事
    term_en: Layered Narrative
    dilemma: 小雅做的議題很複雜，常被說太難懂。她要嘛被迫簡化，要嘛被忽略。
    solution: 她做三層：一句話、三段話、完整版。做完整版很累、也需要寫作練習，但當她把入口做得友善，更多人願意走進深處，她也不用背叛複雜度。

  - term_zh: 同儕互推
    term_en: Peer Referral
    dilemma: 阿哲總覺得把案子轉出去很可惜，所以硬吃不適合的案。結果客戶不滿意，他也很痛苦。
    solution: 他開始把不適合的案子轉給更適合的人，並建立互推回流。前期他怕自己吃虧，但當別人也把適合他的案子轉回來，工作變得更順，口碑也更好。

  - term_zh: 混合收入
    term_en: Mixed Revenue
    dilemma: 小倩只靠單一收入（接案），一旦市場冷就立刻恐慌。
    solution: 她把收入拆成三條：接案、教學、授權/小商品。每條都要時間建，初期很累、像三份工作，但當三條一起跑起來，她不再被單一市場綁架。

  - term_zh: 授權模式
    term_en: Licensing
    dilemma: 阿豪以為「買斷」才專業，結果作品被用到天邊，他卻拿不到任何延伸收益。
    solution: 他學會授權：限定用途、延展加價。談授權會被嫌麻煩，但當他遇到懂規則的客戶，合作反而更長期，因為雙方都知道怎麼用、怎麼付。

  - term_zh: 共同治理
    term_en: Cooperative Governance
    dilemma: 小雅和朋友一起做團隊，沒有規則，最後誰做最多誰最累。久了感情也受傷。
    solution: 她們一起訂規則：工時、分帳、決策方式、衝突處理。建立規則會吵架，但當規則存在，爭執反而變少，合作也更能長久。

  - term_zh: 公共委託
    term_en: Public Commission
    dilemma: 阿哲不想只為品牌服務，但又怕公共案子沒錢、流程很煩。
    solution: 他先從小型公共合作開始，學會怎麼寫提案與控風險。流程真的慢、文件很煩，但當他完成第一個公共案子後，後續資源與信任更容易累積，不再只是靠市場熱度。

  - term_zh: 資料最小化
    term_en: Data Minimization
    dilemma: 小倩做產品設計，被要求蒐集更多資料以便「優化」。她心裡不安，但又怕被說不懂商業。
    solution: 她提出最小化方案：只收必要資料並清楚告知。推動會遇到阻力，但當她用「信任＝長期轉換」說服，團隊發現用戶反感下降，反而對產品更忠誠。

  - term_zh: 風險界定
    term_en: Liability Boundaries
    dilemma: 阿豪交付後客戶說「有問題都是你負責」，但很多問題其實是客戶自行改動造成。
    solution: 他加上責任界定：你改我就不保固、保固範圍清楚寫。客戶會不爽，但當他把界線說得很專業，真正想長期合作的客戶反而更安心。

  - term_zh: 停工條款
    term_en: Stop-work Clause
    dilemma: 小雅遇到一直不付款的客戶，卻仍被催交付。她越做越委屈，還怕得罪人。
    solution: 她設定逾期就停工並書面通知。第一次停工她很害怕，但當她真的執行，對方才開始認真付款；她也第一次知道自己可以保護自己。

  - term_zh: 成本核算
    term_en: True Costing
    dilemma: 阿哲報價只算工時，沒算溝通、管理、修改，結果做完覺得自己被掏空。
    solution: 他把「不可見工」列進報價：溝通、管理、風險。報價變高會被拒絕，他也會焦慮，但當他找到願意付真成本的客戶，工作才不再是慢性倒貼。

  - term_zh: 時間主權
    term_en: Time Sovereignty
    dilemma: 小倩的時間被別人的需求切碎，永遠在回訊息，做不了深度工作。
    solution: 她把時間切成「深度區塊」並關通知。剛開始她怕錯過急事，但當她設定緊急通道（電話＋加急費），她反而更能掌控節奏，也交付得更好。

  - term_zh: 注意力主權
    term_en: Attention Sovereignty
    dilemma: 阿豪每天刷平台找靈感，最後變成比較與焦慮，腦袋像被占滿。
    solution: 他設「攝取窗口」：每天只在固定時間看，其他時間只做。戒斷期很痛，他會手癢，但當他重新把注意力放回作品，他的語氣與風格也變得更像自己。

  - term_zh: 社會證明
    term_en: Social Proof
    dilemma: 小雅覺得要很多人認可才算值得，於是一直追大客戶與大平台。追不到就覺得自己沒價值。
    solution: 她改用「小而真」的社會證明：三封推薦信、三個詳細案例。累積很慢也不 flashy，但當她用這些去談合作，對方更信任她的可靠性，而不是只看名氣。

  - term_zh: 結構性不平等
    term_en: Structural Inequality
    dilemma: 阿哲一直覺得自己為什麼比別人更難成功，最後變成自我否定。
    solution: 他開始把問題命名：資源、階級、語言、身份、地理。承認結構會痛，因為它不是你努力就能立刻改，但當他不再用羞恥驅動自己，就能把精力用在可行策略：找盟友、找制度縫隙、走長線。

  - term_zh: 情感勒索交易
    term_en: Affective Coercion
    dilemma: 客戶對小倩說「你如果在乎我們就會幫忙」。她一心軟就加班，最後還被嫌不夠快。
    solution: 她學會把感情和條件分開：「我在乎合作，所以我們要用清楚條款保護彼此。」說出口很難也會內疚，但當她守住一次，對方的勒索就少一次，她也越來越能把自己當人看。

  - term_zh: 規則外包
    term_en: Rule Externalization
    dilemma: 阿豪總被告知「平台規則改了你就配合」，他像永遠住在別人的地上。
    solution: 他把平台當分發不是家：作品主體放自有網站、檔案自存。這很麻煩也沒立即回報，但當平台變動時，他不再被掐住喉嚨。

  - term_zh: 內容工廠化
    term_en: Content Industrialization
    dilemma: 小雅把自己排成每日內容，最後每天都像交作業。她明明在發作品，心裡卻很空。
    solution: 她改成「季節式」：一段時間創作、一段時間發布。切換期會焦慮、流量也會波動，但當她把創作的節奏找回來，內容反而更有生命，支持者也更願意等。

  - term_zh: 可展示性霸權
    term_en: Legibility Bias
    dilemma: 阿哲的工作很多是「讓事情順利」：協調、排雷、照顧團隊，但外界只看到最後那張圖。
    solution: 他把不可見工作寫成故事：決策、風險、取捨。整理很累也不一定有人讀，但當他在面談或提案時用這些故事說服對方，對方才知道他不是只會做圖，而是能把事做成的人。

  - term_zh: 新公共管理
    term_en: New Public Management
    dilemma: 小倩在公共機構做文化案，被要求像企業一樣做KPI。她越做越覺得文化被變成報表。
    solution: 她學會在KPI裡放進「質性證據」：訪談、社群回饋、案例故事。填表仍然痛苦，但當她把人留下來的改變寫進去，計畫也更容易延續，而不是只為了數字活。

  - term_zh: 道德化貧窮
    term_en: Moralizing Poverty
    dilemma: 有人對阿豪說「藝術家本來就該清貧」。他聽久了覺得想賺錢很羞恥。
    solution: 他把錢視為「可持續的燃料」：賺錢是為了活下去、照顧自己、做更長的作品。轉念會被同溫層嘲笑，但當他活得更穩，反而更能持續創作，也更能幫助他人。

  - term_zh: 階級門檻
    term_en: Class Barrier
    dilemma: 小雅看到很多機會需要先有時間、設備、甚至先付費才能參加。她覺得自己永遠跟不上。
    solution: 她改走「低成本路徑」：公開徵件、社群合作、資源共享。這條路慢、也常要自己搭平台，但當她建立起同儕網與共享資源，門檻不會消失，卻不再完全堵死她。

  - term_zh: 倖存者偏誤
    term_en: Survivorship Bias
    dilemma: 阿哲只看到「成功的人」講故事，就以為照做一定行。照做不行時，他只會怪自己。
    solution: 他開始收集「失敗故事」與「看不見的成本」，把成功當成多因素。這會讓人有點沮喪，但也更真實；當他不再被成功故事催眠，他做選擇更穩，也更少自責。

  - term_zh: 慢暴力
    term_en: Slow Violence
    dilemma: 小倩不是一天崩潰，而是每次小小倒貼、每次小小加班、每次小小吞下不合理，慢慢把自己磨光。
    solution: 她從最小的地方改：一次只修一條規則（例如先收訂金）。改的過程會反覆破功，但每守住一次，她就把自己從慢性損耗裡拉回一點，最後形成一套能保護她的工作方式。

  - term_zh: 再分配
    term_en: Redistribution
    dilemma: 阿豪發現資源總是流向同一群人：同樣的展、同樣的獎、同樣的合作。旁邊的人再努力也像撞牆。
    solution: 他加入一個小型資源共享行動：公開機會、把部分收入拿來支持新手、共用設備。這會引來質疑「你在做慈善嗎」，也會遇到不公平的挫折，但當社群開始長出新的機會循環，他也不再只是等待被選中，而是在一起改變分配方式。
