<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">draw order</title>
  <desc id="desc">If background is called after circle, it covers the circle.</desc>
  <defs>
    <style>
      .bg { fill: #fffef0; }
      .panel { fill: #fff8dc; stroke: #000; stroke-width: 3; }
      .canvas { fill: #fffaf0; stroke: #000; stroke-width: 2.5; }
      .bglayer { fill: #ffe7b8; }
      .dot { fill: #ffd77d; stroke: #000; stroke-width: 2; }
      .line { stroke: #000; stroke-width: 2.5; }
      .t { font: 20px "Apfel Grotezk", Arial, sans-serif; fill: #000; }
      .m { font: 18px "Apfel Grotezk", Arial, sans-serif; fill: #000; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="420" />

  <rect class="panel" x="70" y="64" width="500" height="292" rx="16" />
  <text class="t" x="320" y="108" text-anchor="middle">circle() then background()</text>

  <rect class="canvas" x="126" y="132" width="388" height="178" rx="10" />
  <rect class="bglayer" x="126" y="132" width="388" height="178" rx="10" />
  <text class="m" x="320" y="336" text-anchor="middle">circle hidden</text>

  <rect class="panel" x="630" y="64" width="500" height="292" rx="16" />
  <text class="t" x="880" y="108" text-anchor="middle">background() then circle()</text>

  <rect class="canvas" x="686" y="132" width="388" height="178" rx="10" />
  <rect class="bglayer" x="686" y="132" width="388" height="178" rx="10" />
  <circle class="dot" cx="880" cy="221" r="42" />
  <line class="line" x1="840" y1="221" x2="920" y2="221" />
  <text class="m" x="880" y="336" text-anchor="middle">circle visible</text>
</svg>
